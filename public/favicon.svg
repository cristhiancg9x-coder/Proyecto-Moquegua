<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/> <!-- Tailwind blue-500 -->
      <stop offset="100%" stop-color="#22d3ee"/> <!-- Tailwind cyan-400 -->
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/> <!-- Tailwind slate-800 -->
      <stop offset="100%" stop-color="#0f172a"/> <!-- Tailwind slate-900 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring (Speaker Edge) -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="#3b82f6" stroke-width="8" />
  
  <!-- Inner Ring (Speaker Cone pattern) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="10 10"/>
  <circle cx="256" cy="256" r="140" fill="#020617" opacity="0.6"/>

  <!-- Soundwave Equalizer (representing Sound & Lights) -->
  <g filter="url(#glow)">
    <rect x="140" y="216" width="32" height="80" rx="16" fill="url(#brand-grad)" />
    <rect x="194" y="156" width="32" height="200" rx="16" fill="url(#brand-grad)" />
    <rect x="248" y="106" width="32" height="300" rx="16" fill="url(#brand-grad)" />
    <rect x="302" y="176" width="32" height="160" rx="16" fill="url(#brand-grad)" />
    <rect x="356" y="226" width="32" height="60" rx="16" fill="url(#brand-grad)" />
  </g>
</svg>
